; xroar-waveshare-rp2350-pizero PlatformIO configuration
; XRoar (Tandy CoCo emulator) for the Waveshare RP2350-PiZero (mini-HDMI via libdvi).
;
; >>> READ docs/BUILD.md FIRST <<< — it documents every build env, the full
;     HDMI/audio build-flag matrix, how to flash + read the serial monitor, and
;     two non-obvious toolchain gotchas (PICO_NO_HARDWARE; the env-var build
;     cache trap). Keep that file in sync when you add/change a build flag.
;
; Envs (define a real env per configuration — do NOT pass one-off -D flags via
; the PLATFORMIO_BUILD_FLAGS env var; SCons does not reliably invalidate cached
; objects for it, so you silently flash a stale build. See docs/BUILD.md):
;   pizero         — SILENT baseline: double-buffered, tear-free, no HDMI audio.
;   pizero_audio   — the working product build: live HDMI audio (HDMI_DATA_ISLAND).
;   pizero_bench   — pizero_audio + the PIZERO-36 per-line encode micro-benchmark.
;
;   pio run -e pizero_audio -t upload   &&   pio device monitor

; PIZERO-45: the default is now the true-60Hz streaming-audio + USB product build.
; The off-spec 24 MHz/52 Hz envs (pizero / pizero_audio / pizero_stream /
; pizero_60hz) are KEPT as documented fallbacks (e.g. a monitor that balks at the
; tight h_fp=8/h_bp=56) until 60 Hz is validated across more displays (PIZERO-42).
[platformio]
default_envs = pizero_stream_60

[env:pizero]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
; Dedicated RP2350B board (48 GPIO, 16 MB flash) — the HDMI TMDS pins are
; GPIO 32-39, which only exist on the B variant. PIZERO-04.
board = waveshare_rp2350_pizero
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0

; PIZERO-02b spike: sys clock at 240 MHz so Pico-PIO-USB (which requires
; CPU == 120 or 240 MHz) can coexist with DVI. main.cpp picks a custom
; 640x480 timing with a 24 MHz pixel clock -> ~57.14 Hz refresh
; (off-spec vs 60 Hz, monitor-tolerated via EDID).
board_build.f_cpu = 240000000L

build_flags =
    -DARDUINO_ARCH_RP2040
    -O2
    ; libdvi drives TMDS on GPIO 32-39, so PIO needs the >31 GPIO window.
    -DPICO_PIO_USE_GPIO_BASE=1
    ; libdvi 320x240->640x480: 2 TMDS symbols/word + vertical line-doubling.
    -DDVI_VERTICAL_REPEAT=2
    -DDVI_SYMBOLS_PER_WORD=2
    ; VDG render via coco_machine_render_frame() (not xroar per-scanline).
    -DSUPPRESS_RENDER_SCANLINE
    ; PIZERO-11: swap earlephilhower's stock USB stack for Adafruit TinyUSB
    ; (host mode + Pico-PIO-USB bit-banging on GPIO 28/29). PIO-USB itself
    ; runs on PIO 1 (libdvi owns PIO 0); see main.cpp.
    -DUSE_TINYUSB
    -DCFG_TUH_RPI_PIO_USB=1
    -DCFG_TUH_HID=4
    -DCFG_TUH_HID_EPIN_BUFSIZE=64
    -DCFG_TUH_HID_EPOUT_BUFSIZE=64

; earlephilhower appends -Os after our flags; strip it so the hot paths get -O2.
build_unflags = -Os

; PIZERO-09: full XRoar integration — emulator + boot/blit + SD.
build_src_filter =
    +<main.cpp>
    +<coco_boot.cpp>
    +<hw_config.c>

; Deep dependency resolution (libdvi, xroar_core <-> coco_machine <-> psram_stub).
lib_ldf_mode = deep+

; microSD over SPI (PiZero pins in src/hw_config.c). Same lib as the AMOLED port.
; Adafruit TinyUSB (host) + Pico-PIO-USB for PIZERO-11. Pico-PIO-USB declares
; rp2040-only framework compat but works on rp2350 — disable strict matching.
lib_deps =
    carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1
    adafruit/Adafruit TinyUSB Library
    https://github.com/sekigon-gonnoc/Pico-PIO-USB.git

lib_compat_mode = off

monitor_speed = 115200

; ─────────────────────────────────────────────────────────────────────────
; pizero_audio — THE WORKING PRODUCT BUILD (live HDMI audio).
; `pizero` above is the SILENT baseline (double-buffered, tear-free, no audio).
; Enabling HDMI_DATA_ISLAND switches the framebuffer to single-buffer to free
; ~150 KB for the audio-island buffers, and turns on the data-island/audio path.
; This is what you flash to demo or test sound. See docs/BUILD.md for the full
; optional-flag matrix (HDMI_AUDIO_SYNTH, AUDIO_WAV_DUMP, HDMI_STD_TIMING, …).
[env:pizero_audio]
extends = env:pizero
build_flags =
    ${env:pizero.build_flags}
    -DHDMI_DATA_ISLAND

; pizero_bench — pizero_audio + the PIZERO-36 Stage-0 micro-benchmark. Prints
; "[bench] … ns/encode" once over serial at boot: the cost of one RAM-resident
; per-line audio-island encode, the go/no-go number for encoding inside the
; core-1 DMA IRQ (PIZERO-35 streaming delivery). Remove once PIZERO-36 closes.
[env:pizero_bench]
extends = env:pizero_audio
build_flags =
    ${env:pizero_audio.build_flags}
    -DHDMI_ENCODE_BENCH

; pizero_stream — PIZERO-38 streaming HDMI-audio delivery: per-active-line islands
; encoded one line ahead in the core-1 IRQ into a rotating pool, with a 16.16
; sample meter (replaces the bursty 77-line bank scheme to kill frame-rate
; warble). Live CoCo audio source (the cross-core ring-from-IRQ is PIZERO-39).
[env:pizero_stream]
extends = env:pizero_audio
build_flags =
    ${env:pizero_audio.build_flags}
    -DHDMI_STREAM_AUDIO

; pizero_stream_synth — pizero_stream + a clean 440 Hz wavetable source instead of
; the emulator. PRIMARY warble acceptance test: a pure sine has ~no harmonics, so
; a steady tone == transport fixed; any frame-rate warble == still a delivery bug.
[env:pizero_stream_synth]
extends = env:pizero_stream
build_flags =
    ${env:pizero_stream.build_flags}
    -DHDMI_AUDIO_SYNTH

; pizero_stream_60 — PIZERO-45: TRUE 640x480p60 (252 MHz sysclk -> 25.2 MHz pixel,
; 800x525 = 60.0 Hz) WITH streaming HDMI audio AND USB host. The 800-total line is
; split 8/96/56/640 so the 56px back porch (28 words) fits one streaming island;
; cadence is 800 samples/frame (48000/60); ACR CTS=25200 (in-spec pixel). This is
; the intended 60 Hz product build that retires the off-spec 24 MHz/52 Hz timing
; once HW-confirmed (then folds into the default + PIZERO-40/42 cleanup).
[env:pizero_stream_60]
extends = env:pizero_stream
build_flags =
    ${env:pizero_stream.build_flags}
    -DHDMI_60HZ

; pizero_60hz — PIZERO-44 experiment: TRUE 640x480p60 (252 MHz sysclk -> 25.2 MHz
; pixel, standard 800x525 = 60.0 Hz) with USB host ENABLED. No audio (the wide
; audio back porch can't fit in 800-total). Tests the two unknowns: does the
; monitor lock 60 Hz, and does PIO-USB enumerate at 252 MHz (dividers are exact:
; 252/48 = 5.25). If both pass, 60 Hz + USB is achievable and we re-fit audio next.
[env:pizero_60hz]
extends = env:pizero
build_flags =
    ${env:pizero.build_flags}
    -DHDMI_60HZ_TEST

; pizero_stream_std — diagnostic: streaming live audio on STANDARD 25.2 MHz / 252
; MHz-sysclk timing. Proves the residual sharp-pitch+buzz is the off-spec 24 MHz
; clock (this sink ignores ACR and locks audio to the video clock). DISABLES the
; USB host (PIO-USB needs sysclk=120/240 MHz) -- input via the serial console.
[env:pizero_stream_std]
extends = env:pizero_stream
build_flags =
    ${env:pizero_stream.build_flags}
    -DHDMI_STD_TIMING

; pizero_wavmeas — measure the audio SOURCE: no HDMI (so only the WAV-dump drains
; the ring), boots clean BASIC, autotypes a sustained SOUND 159, streams a base64
; WAV out USB-CDC. Decode + analyze on the host to get the exact source frequency
; and waveform (isolates emulation/resampler from HDMI delivery). Diagnostic only.
[env:pizero_wavmeas]
extends = env:pizero
build_flags =
    ${env:pizero.build_flags}
    -DAUDIO_WAV_DUMP

; pizero_wdtest — PIZERO-33 watchdog self-test: deliberately wedges core 0 ~10s
; after boot. Expect an auto-reboot ~3s later whose banner reports the board was
; "stuck in 'emulate'". Validates auto-recovery + the phase-trace end-to-end.
[env:pizero_wdtest]
extends = env:pizero_stream
build_flags =
    ${env:pizero_stream.build_flags}
    -DWATCHDOG_SELFTEST

; pizero_stream_lpf — streaming live audio with the 2-pole TV-bandwidth output LPF
; re-enabled (PIZERO-30 had bypassed it). Tests whether the residual "buzz" vs
; desktop xroar is just our brighter, unfiltered square wave.
[env:pizero_stream_lpf]
extends = env:pizero_stream
build_flags =
    ${env:pizero_stream.build_flags}
    -DAUDIO_OUTPUT_LPF

; ─────────────────────────────────────────────────────────────────────────
; PIZERO-11 triage env: builds ONLY Waveshare's unmodified device_info demo
; (.ref/demo/RP2350-PiZero/Arduino/02-USB/device_info/device_info.ino,
; copied to demo/device_info_demo.cpp with #include <Arduino.h> + a couple
; of forward decls; the .ino->.cpp diff is in the file header). Use this to
; A/B test whether USB enumeration works at all on this exact hardware,
; independent of libdvi/XRoar.
;
;   pio run -e waveshare_demo -t upload
;   pio device monitor
; ─────────────────────────────────────────────────────────────────────────
[env:waveshare_demo]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2350_pizero
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0
board_build.f_cpu = 240000000L

build_flags =
    -DARDUINO_ARCH_RP2040
    -O2
    -DUSE_TINYUSB
    -DCFG_TUH_RPI_PIO_USB=1
    -DCFG_TUH_HID=4

build_unflags = -Os

build_src_filter =
    -<*>
    +<../demo/device_info_demo.cpp>

lib_deps =
    adafruit/Adafruit TinyUSB Library
    https://github.com/sekigon-gonnoc/Pico-PIO-USB.git

lib_compat_mode = off

monitor_speed = 115200
